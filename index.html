<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desafio 40K</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 15px;
    }

    h1 {
        text-align: center;
        margin-bottom: 5px;
    }

    .info {
        background: #2ecc71;
        color: #fff;
        padding: 12px;
        border-radius: 10px;
        text-align: center;
        margin-bottom: 15px;
    }

    .info p {
        margin: 5px 0;
        font-size: 17px;
        font-weight: bold;
    }

    .container {
        display: flex;
        justify-content: center;
        gap: 15px;
        flex-wrap: wrap;
    }

    table {
        border-collapse: collapse;
        background: #fff;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    td {
        border: 1px solid #ccc;
        width: 45px;
        height: 35px;
        text-align: center;
        cursor: pointer;
        user-select: none;
        font-size: 14px;
    }

    td:hover {
        background: #e0e0e0;
    }

    .done {
        background: #2ecc71 !important;
        color: #fff;
        font-weight: bold;
    }
</style>
</head>

<body>

<h1>Desafio dos 40K</h1>

<div class="info">
    <p>Total guardado: R$ <span id="total">0,00</span></p>
    <p>Progresso: <span id="percent">0</span>%</p>
</div>

<div class="container">
    <table id="table1"></table>
    <table id="table2"></table>
</div>

<script>
    const OBJETIVO = 40000;
    let total = 0;

    const saved = JSON.parse(localStorage.getItem("desafio40k")) || [];

    function updateInfo() {
        document.getElementById("total").textContent =
            total.toLocaleString("pt-BR", { minimumFractionDigits: 2 });

        const percent = Math.min((total / OBJETIVO) * 100, 100);
        document.getElementById("percent").textContent = percent.toFixed(2);
    }

    function saveData() {
        localStorage.setItem("desafio40k", JSON.stringify(saved));
    }

    function createTable(tableId, numbers) {
        const table = document.getElementById(tableId);
        let row;

        numbers.forEach((num, index) => {
            if (index % 5 === 0) row = table.insertRow();

            const cell = row.insertCell();
            cell.textContent = num;

            if (saved.includes(num)) {
                cell.classList.add("done");
                total += num;
            }

            cell.addEventListener("click", () => {
                if (cell.classList.contains("done")) {
                    cell.classList.remove("done");
                    total -= num;
                    saved.splice(saved.indexOf(num), 1);
                } else {
                    cell.classList.add("done");
                    total += num;
                    saved.push(num);
                }
                saveData();
                updateInfo();
            });
        });
    }

    const asc = Array.from({ length: 200 }, (_, i) => i + 1);
    const desc = Array.from({ length: 200 }, (_, i) => 200 - i);

    createTable("table1", asc);
    createTable("table2", desc);
    updateInfo();
</script>

</body>
</html>
