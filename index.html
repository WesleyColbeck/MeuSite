<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gosth Drinks | Coquetelaria para Eventos</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg-dark: #0f0f0f;
  --bg-light: #1a1a1a;
  --gold: #c9a24d;
  --text: #eaeaea;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: var(--bg-dark);
  color: var(--text);
  font-family: 'Montserrat', sans-serif;
}

section {
  padding: 80px 10%;
}

h1, h2, h3 {
  font-family: 'Cinzel', serif;
  color: var(--gold);
  margin-bottom: 20px;
}

/* HERO */
.hero {
  height: 100vh;
  background: linear-gradient(rgba(0,0,0,.7), rgba(0,0,0,.9)),
              url("https://images.unsplash.com/photo-1510627498534-cf7e9002facc");
  background-size: cover;
  background-position: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.hero h1 {
  font-size: 3.5rem;
}

.hero a {
  margin-top: 30px;
  padding: 15px 40px;
  border: 1px solid var(--gold);
  color: var(--gold);
  text-decoration: none;
  width: fit-content;
}

/* HISTÓRIA */
.historia {
  background: var(--bg-light);
}

/* CARDÁPIO */
.cardapio-img {
  text-align: center;
  margin-bottom: 40px;
}

.cardapio-img img {
  max-width: 100%;
  border-radius: 6px;
  border: 1px solid #333;
}

.botao-drinks {
  display: block;
  margin: 0 auto 60px;
  padding: 15px 40px;
  border: 1px solid var(--gold);
  background: none;
  color: var(--gold);
  font-family: 'Cinzel', serif;
  cursor: pointer;
  text-decoration: none;
  text-align: center;
}

/* CARROSSEL */
.carrossel {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
}

.carrossel img {
  width: 300px;
  height: 200px;
  object-fit: cover;
  border-radius: 6px;
  scroll-snap-align: center;
}

/* CONTATO */
.contato {
  text-align: center;
}

.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25d366;
  color: #000;
  padding: 15px 20px;
  border-radius: 50px;
  text-decoration: none;
}
</style>
</head>

<body>

<section class="hero">
  <h1>Gosth Drinks</h1>
  <p>Clássicos não saem de moda. Experiências, sim.</p>
  <a href="#cardapio">Ver Cardápio</a>
</section>

<section class="historia">
  <h2>O que faz um clássico ser um clássico?</h2>
  <p>Excelência, equilíbrio e identidade.</p>
</section>

<section id="cardapio">
  <h2>Cardápio</h2>

  <div class="cardapio-img">
    <img src="cardapio.jpg" alt="Cardápio Gosth Drinks">
  </div>

  <a class="botao-drinks" href="drinks.html">
    Ver todos os drinks
  </a>

  <div class="carrossel">
    <!-- FOTOS DOS EVENTOS -->
    <img src="evento1.jpg">
    <img src="evento2.jpg">
    <img src="evento3.jpg">
  </div>
</section>

<section class="contato">
  <h2>Contato</h2>
  <p><strong>WhatsApp:</strong> (SEU NÚMERO)</p>
</section>

<a class="whatsapp" href="https://wa.me/55SEUNUMERO">WhatsApp</a>

</body>
</html>
